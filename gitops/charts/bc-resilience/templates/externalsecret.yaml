{{/* templates/externalsecret.yaml — ESO ExternalSecret → Vault */}}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name:      {{ .Values.app.name }}-secret
  namespace: {{ .Values.global.namespace }}
spec:
  refreshInterval: {{ .Values.app.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.app.externalSecret.secretStoreName }}
    kind: {{ .Values.app.externalSecret.secretStoreKind }}
  target:
    name:             {{ .Values.app.name }}-secret
    creationPolicy:   Owner
  data:
    - secretKey:  GITHUB_APP_ID
      remoteRef:
        key:      {{ .Values.app.externalSecret.vaultPath }}
        property: GITHUB_APP_ID
    - secretKey:  GITHUB_APP_PRIVATE_KEY
      remoteRef:
        key:      {{ .Values.app.externalSecret.vaultPath }}
        property: GITHUB_APP_PRIVATE_KEY
    - secretKey:  GITHUB_APP_WEBHOOK_SECRET
      remoteRef:
        key:      {{ .Values.app.externalSecret.vaultPath }}
        property: GITHUB_APP_WEBHOOK_SECRET
    - secretKey:  GITHUB_MODELS_API_KEY
      remoteRef:
        key:      {{ .Values.app.externalSecret.vaultPath }}
        property: GITHUB_MODELS_API_KEY
    - secretKey:  OC_SILVER_TOKEN
      remoteRef:
        key:      {{ .Values.app.externalSecret.vaultPath }}
        property: OC_SILVER_TOKEN
    - secretKey:  OC_GOLD_TOKEN
      remoteRef:
        key:      {{ .Values.app.externalSecret.vaultPath }}
        property: OC_GOLD_TOKEN
