# gitops/argocd/bc-resilience-service-dev.yaml
# ArgoCD Application — bc-resilience-service dev
# Syncs from gitops repo: rloisell/bc-resilience-service-gitops
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name:      bc-resilience-service-dev
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name:       bc-resilience-service
    app.kubernetes.io/managed-by: argocd
    environment:                  dev
spec:
  project: default
  source:
    repoURL:        https://github.com/rloisell/bc-resilience-service-gitops.git
    targetRevision: develop
    path:           charts/bc-resilience
    helm:
      valueFiles:
        - values.yaml
  destination:
    server:    https://kubernetes.default.svc
    namespace: be808f-dev
  syncPolicy:
    automated:
      prune:    true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ApplyOutOfSyncOnly=true
